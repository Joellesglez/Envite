<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Envite Zulo - Los del Molino</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #F2F2F7;
            --card-bg: #FFFFFF;
            --text-main: #1C1C1E;
            --text-muted: #8E8E93;
            --blue: #007AFF;
            --pink: #FF2D55;
            --gold: #FF9500;
            --green: #34C759;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            --radius: 24px;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* PANTALLA DE INICIO (MODAL) */
        #setup-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--card-bg);
            padding: 30px 20px;
            border-radius: var(--radius);
            text-align: center;
            width: 90%;
            max-width: 350px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        .modal-content h2 {
            margin: 0 0 10px 0;
            font-weight: 800;
            color: var(--text-main);
        }

        .modal-content p {
            color: var(--text-muted);
            font-size: 0.95em;
            margin-bottom: 25px;
        }

        .player-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-option {
            background: var(--bg-color);
            color: var(--text-main);
            border: none;
            padding: 16px;
            border-radius: 16px;
            font-size: 1.1em;
            font-weight: 800;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-option:active {
            transform: scale(0.96);
            background: #E5E5EA;
        }

        .btn-option.primary {
            background: var(--blue);
            color: white;
        }

        /* CONTENEDOR PRINCIPAL DE LA APP */
        .app-container {
            width: 100%;
            max-width: 450px;
            display: none;
            /* Se oculta hasta elegir jugadores */
            flex-direction: column;
            gap: 20px;
            padding: 20px 15px;
        }

        .header {
            text-align: center;
            margin-bottom: 5px;
        }

        .header h1 {
            margin: 0;
            font-weight: 800;
            font-size: 1.8em;
            letter-spacing: -0.5px;
        }

        .header p {
            margin: 5px 0 0 0;
            color: var(--text-muted);
            font-size: 0.9em;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* MARCADOR */
        .scoreboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .team-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .team-card.chicos-card {
            border-top: 6px solid var(--blue);
        }

        .team-card.chicas-card {
            border-top: 6px solid var(--pink);
        }

        .team-name {
            font-size: 1.1em;
            font-weight: 800;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .chicos-card .team-name {
            color: var(--blue);
        }

        .chicas-card .team-name {
            color: var(--pink);
        }

        .badges-container {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            width: 100%;
        }

        .badge {
            background: var(--bg-color);
            padding: 8px;
            border-radius: 12px;
            text-align: center;
            flex: 1;
            font-size: 0.75em;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            transition: 0.2s;
        }

        .badge:active {
            transform: scale(0.95);
            background: #e5e5ea;
        }

        .badge span {
            display: block;
            font-size: 1.6em;
            color: var(--text-main);
            font-weight: 800;
            margin-top: 2px;
        }

        .counter-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            background: var(--bg-color);
            border-radius: 20px;
            padding: 10px;
        }

        .btn-count {
            width: 40px;
            height: 40px;
            border-radius: 14px;
            border: none;
            font-size: 1.5em;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-minus {
            background: #E5E5EA;
            color: var(--text-muted);
        }

        .btn-plus {
            background: var(--text-main);
            color: #fff;
        }

        .btn-count:active {
            transform: scale(0.9);
        }

        .piedras-display {
            font-size: 3em;
            font-weight: 800;
            margin: 0;
            line-height: 1;
            transition: 0.3s color;
        }

        .tumbo {
            color: var(--gold);
        }

        /* PANEL DE CONTROLES */
        .panel {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow);
        }

        .panel-title {
            font-size: 1.1em;
            font-weight: 800;
            margin: 0 0 15px 0;
            color: var(--text-main);
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            font-size: 0.85em;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        select,
        input[type="text"] {
            width: 100%;
            padding: 14px;
            background: var(--bg-color);
            border: 2px solid transparent;
            border-radius: 14px;
            font-family: inherit;
            font-size: 1em;
            font-weight: 600;
            color: var(--text-main);
            outline: none;
            transition: 0.2s;
            appearance: none;
        }

        input[type="text"]::placeholder {
            color: #A1A1A6;
            font-weight: 500;
        }

        input[type="text"]:focus,
        select:focus {
            border-color: var(--blue);
            background: #fff;
        }

        .btn-primary {
            width: 100%;
            background: var(--green);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 16px;
            font-size: 1.1em;
            font-weight: 800;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 15px rgba(52, 199, 89, 0.3);
        }

        .btn-primary:active {
            transform: scale(0.98);
            box-shadow: none;
        }

        /* HISTORIAL */
        .history-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 250px;
            overflow-y: auto;
        }

        .history-item {
            padding: 12px 0;
            border-bottom: 1px solid #E5E5EA;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .hist-icon {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-top: 6px;
        }

        .hist-chicos {
            background: var(--blue);
        }

        .hist-chicas {
            background: var(--pink);
        }

        .hist-system {
            background: var(--gold);
        }

        .hist-content {
            flex: 1;
        }

        .hist-time {
            font-size: 0.75em;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 2px;
        }

        .hist-text {
            font-size: 0.9em;
            font-weight: 500;
            line-height: 1.4;
        }

        .hist-text strong {
            font-weight: 800;
        }

        .hist-cards {
            font-size: 0.8em;
            color: var(--gold);
            font-weight: 600;
            margin-top: 2px;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #D1D1D6;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <div id="setup-modal">
        <div class="modal-content">
            <h2>🎴 Envite Canario</h2>
            <p>¿Cuántas personas van a jugar?</p>
            <div class="player-options">
                <button class="btn-option primary" onclick="iniciarPartida(6)">Mesa de 6 Jugadores</button>
                <button class="btn-option primary" onclick="iniciarPartida(8)">Mesa de 8 Jugadores</button>
                <button class="btn-option primary" onclick="iniciarPartida(10)">Mesa de 10 Jugadores</button>
            </div>
        </div>
    </div>

    <div class="app-container" id="main-app">
        <div class="header">
            <h1>Marcador Envite</h1>
            <p id="game-info">Configurando partida...</p>
        </div>

        <div class="scoreboard">
            <div class="team-card chicos-card">
                <div class="team-name">Chicos</div>
                <div class="badges-container">
                    <div class="badge" onclick="sumarManual('chicos', 'chicos')"
                        title="Toca para sumar un chico manual">
                        Chicos <span id="chicos-chicos">0</span>
                    </div>
                    <div class="badge" onclick="sumarManual('chicos', 'partidos')"
                        title="Toca para sumar un partido manual">
                        Partidos <span id="partidos-chicos">0</span>
                    </div>
                </div>
                <div class="counter-wrapper">
                    <button class="btn-count btn-minus" onclick="modificarPiedras('chicos', -1)">-</button>
                    <p class="piedras-display" id="piedras-chicos">0</p>
                    <button class="btn-count btn-plus" onclick="modificarPiedras('chicos', 1)">+</button>
                </div>
            </div>

            <div class="team-card chicas-card">
                <div class="team-name">Chicas</div>
                <div class="badges-container">
                    <div class="badge" onclick="sumarManual('chicas', 'chicos')"
                        title="Toca para sumar un chico manual">
                        Chicos <span id="chicos-chicas">0</span>
                    </div>
                    <div class="badge" onclick="sumarManual('chicas', 'partidos')"
                        title="Toca para sumar un partido manual">
                        Partidos <span id="partidos-chicas">0</span>
                    </div>
                </div>
                <div class="counter-wrapper">
                    <button class="btn-count btn-minus" onclick="modificarPiedras('chicas', -1)">-</button>
                    <p class="piedras-display" id="piedras-chicas">0</p>
                    <button class="btn-count btn-plus" onclick="modificarPiedras('chicas', 1)">+</button>
                </div>
            </div>
        </div>

        <div class="panel">
            <h3 class="panel-title">Anotar Mano</h3>

            <div style="display: flex; gap: 10px;">
                <div class="input-group" style="flex: 1;">
                    <label>Ganador</label>
                    <select id="winner-select">
                        <option value="chicos">Equipo Chicos</option>
                        <option value="chicas">Equipo Chicas</option>
                    </select>
                </div>
                <div class="input-group" style="flex: 1;">
                    <label>Piedras</label>
                    <select id="stones-select">
                        <option value="1">1 (Mano)</option>
                        <option value="2">2 (Envite)</option>
                        <option value="4">4 (Revoco)</option>
                        <option value="7">7 Piedras</option>
                        <option value="9">9 Piedras</option>
                        <option value="12">Chico y fuera</option>
                    </select>
                </div>
            </div>

            <div class="input-group">
                <label>Carta Ganadora (Opcional)</label>
                <input type="text" id="winning-card-input" placeholder="Ej: As de Bastos, Malilla...">
            </div>

            <button class="btn-primary" onclick="registrarMano()">Anotar Victoria</button>
        </div>

        <div class="panel">
            <h3 class="panel-title">Historial</h3>
            <ul class="history-list" id="history-list">
            </ul>
        </div>
    </div>

    <script>
        let state = {
            chicos: { piedras: 0, chicos: 0, partidos: 0 },
            chicas: { piedras: 0, chicos: 0, partidos: 0 },
            jugadores: 0
        };

        // Función para arrancar la partida desde el Modal
        function iniciarPartida(numJugadores) {
            state.jugadores = numJugadores;

            // Ocultar modal y mostrar app
            document.getElementById('setup-modal').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';

            // Actualizar subtítulo
            document.getElementById('game-info').innerText = `Mesa de ${numJugadores} Jugadores`;

            log(`Partida iniciada con ${numJugadores} personas. ¡A jugar! 🎴`, "system");
            actualizarUI();
        }

        function actualizarUI() {
            ['chicos', 'chicas'].forEach(equipo => {
                document.getElementById(`piedras-${equipo}`).innerText = state[equipo].piedras;
                document.getElementById(`chicos-${equipo}`).innerText = state[equipo].chicos;
                document.getElementById(`partidos-${equipo}`).innerText = state[equipo].partidos;

                const piedrasEl = document.getElementById(`piedras-${equipo}`);
                if (state[equipo].piedras >= 11) {
                    piedrasEl.classList.add('tumbo');
                } else {
                    piedrasEl.classList.remove('tumbo');
                }
            });
        }

        function modificarPiedras(equipo, cantidad) {
            let total = state[equipo].piedras + cantidad;
            if (total < 0) total = 0;

            if (total >= 12) {
                ganarChico(equipo);
            } else {
                state[equipo].piedras = total;
                actualizarUI();
            }
        }

        function ganarChico(equipo) {
            state[equipo].piedras = 0;
            state[equipo].chicos += 1;
            log(`${equipo.toUpperCase()} gana un CHICO 🏆`, equipo);

            if (state[equipo].chicos >= 3) { // 3 chicos = 1 partido
                state[equipo].chicos = 0;
                state[equipo].partidos += 1;
                log(`¡${equipo.toUpperCase()} GANA EL PARTIDO! 🎉`, 'system');
            }
            actualizarUI();
        }

        function sumarManual(equipo, tipo) {
            if (tipo === 'chicos') {
                state[equipo].chicos += 1;
                log(`+1 Chico añadido manualmente a ${equipo}.`, 'system');
            } else if (tipo === 'partidos') {
                state[equipo].partidos += 1;
                log(`+1 Partido añadido manualmente a ${equipo}.`, 'system');
            }
            actualizarUI();
        }

        function registrarMano() {
            const equipo = document.getElementById('winner-select').value;
            const piedras = parseInt(document.getElementById('stones-select').value);
            const cartaTexto = document.getElementById('winning-card-input').value.trim();

            let detalleCarta = cartaTexto ? `<div class="hist-cards">🃏 Ganaron con: ${cartaTexto}</div>` : '';

            if (piedras === 12) {
                log(`<strong>¡Chico y Fuera!</strong> sumado por ${equipo}. ${detalleCarta}`, equipo);
                ganarChico(equipo);
            } else {
                log(`Suman <strong>${piedras} piedra(s)</strong>. ${detalleCarta}`, equipo);
                modificarPiedras(equipo, piedras);
            }

            // Limpiar el cuadro de texto y selectores
            document.getElementById('winning-card-input').value = "";
            document.getElementById('stones-select').value = "1";
        }

        function log(htmlText, tipo) {
            const list = document.getElementById('history-list');
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            const li = document.createElement('li');
            li.className = 'history-item';

            let iconClass = `hist-${tipo}`;

            li.innerHTML = `
            <div class="hist-icon ${iconClass}"></div>
            <div class="hist-content">
                <div class="hist-time">${time}</div>
                <div class="hist-text">${htmlText}</div>
            </div>
        `;
            list.insertBefore(li, list.firstChild);
        }
    </script>

</body>

</html>
